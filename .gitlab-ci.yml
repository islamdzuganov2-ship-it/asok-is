# .gitlab-ci.yml — РАБОЧАЯ ВЕРСИЯ
stages:
  - lint
  - test
  - build
  - deploy

variables:
  PYTHON_VERSION: "3.11"
  NODE_VERSION:   "20"
  BACKEND_IMAGE:  $CI_REGISTRY_IMAGE/backend
  FRONTEND_IMAGE: $CI_REGISTRY_IMAGE/frontend

# ── LINT ────────────────────────────────────────────────────
lint:backend:
  stage: lint
  image: python:${PYTHON_VERSION}-slim
  before_script:
    - pip install flake8 --quiet
  script:
    - flake8 backend/app --max-line-length=100 --ignore=E501,W503
  rules:
    - changes: ["backend/**/*"]

lint:frontend:
  stage: lint
  image: node:${NODE_VERSION}-alpine
  before_script:
    - cd frontend && npm ci --silent
  script:
    - npm run lint
  rules:
    - changes: ["frontend/**/*"]

# ── TEST ────────────────────────────────────────────────────
test:backend:
  stage: test
  image: python:${PYTHON_VERSION}-slim
  services:
    - name: postgres:14-alpine
      alias: postgres
      variables:
        POSTGRES_DB:       asok_test
        POSTGRES_USER:     test_user
        POSTGRES_PASSWORD: test_pass
  variables:
    DATABASE_URL: postgresql://test_user:test_pass@postgres:5432/asok_test
    REDIS_URL:    redis://localhost:6379/0
    JWT_SECRET:   ci_test_secret_key_min_32_chars_x
    DEMO_MODE:    "false"
  before_script:
    - cd backend
    - pip install -r requirements.txt --quiet
    - pip install pytest-cov --quiet
  script:
    - alembic upgrade head
    - python -m scripts.seed_metrics
    - pytest tests/ -v --cov=app --cov-report=xml:coverage.xml --cov-fail-under=80
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage.xml
    expire_in: 7d
  rules:
    - changes: ["backend/**/*"]

test:frontend:
  stage: test
  image: node:${NODE_VERSION}-alpine
  before_script:
    - cd frontend && npm ci --silent
  script:
    - npm test -- --coverage --watchAll=false
  artifacts:
    expire_in: 7d
  rules:
    - changes: ["frontend/**/*"]

# ── BUILD ───────────────────────────────────────────────────
build:backend:
  stage: build
  image: docker:24
  services: [docker:24-dind]
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $BACKEND_IMAGE:$CI_COMMIT_SHA -t $BACKEND_IMAGE:latest ./backend
    - docker push $BACKEND_IMAGE:$CI_COMMIT_SHA
    - docker push $BACKEND_IMAGE:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

build:frontend:
  stage: build
  image: docker:24
  services: [docker:24-dind]
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build
        --build-arg REACT_APP_API_BASE_URL=$REACT_APP_API_BASE_URL
        -t $FRONTEND_IMAGE:$CI_COMMIT_SHA
        -t $FRONTEND_IMAGE:latest ./frontend
    - docker push $FRONTEND_IMAGE:$CI_COMMIT_SHA
    - docker push $FRONTEND_IMAGE:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ── DEPLOY ──────────────────────────────────────────────────
deploy:staging:
  stage: deploy
  image: alpine:3.19
  environment:
    name: staging
    url:  $STAGING_URL
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$STAGING_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && ssh-keyscan $STAGING_HOST >> ~/.ssh/known_hosts
  script:
    - ssh $STAGING_USER@$STAGING_HOST "
        cd /opt/asok-is &&
        docker compose pull &&
        docker compose up -d &&
        docker compose exec -T backend alembic upgrade head"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  needs: ["build:backend", "build:frontend"]

deploy:production:
  stage: deploy
  image: alpine:3.19
  environment:
    name: production
    url:  $PRODUCTION_URL
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$PRODUCTION_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && ssh-keyscan $PRODUCTION_HOST >> ~/.ssh/known_hosts
  script:
    - ssh $PRODUCTION_USER@$PRODUCTION_HOST "
        cd /opt/asok-is &&
        docker compose pull &&
        docker compose up -d &&
        docker compose exec -T backend alembic upgrade head"
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  needs: ["deploy:staging"]