name: asok-is

services:

  postgres:
    image: postgres:14-alpine
    container_name: asok_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: asok_is
      POSTGRES_USER: asok_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-asok_pass123}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asok_user -d asok_is"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - asok_net

  redis:
    image: redis:7-alpine
    container_name: asok_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - asok_net

  backend:
    build: ./backend
    container_name: asok_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://asok_user:${POSTGRES_PASSWORD:-asok_pass123}@postgres:5432/asok_is
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./models/llm:/app/models/llm:ro
      - ./Качество системы в разрезе времени по всем характеристикам.xlsx:/app/seed_data/Качество системы в разрезе времени по всем характеристикам.xlsx:ro
      - ./таблица для заполнения v8.1.xlsx:/app/seed_data/таблица для заполнения v8.1.xlsx:ro
      - /app/__pycache__
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - asok_net

  celery_worker:
    build: ./backend
    container_name: asok_celery
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://asok_user:${POSTGRES_PASSWORD:-asok_pass123}@postgres:5432/asok_is
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./models/llm:/app/models/llm:ro
      - /app/__pycache__
    command: celery -A app.workers.tasks.celery_app worker --loglevel=info --concurrency=2
    networks:
      - asok_net

  frontend:
    build: ./frontend
    container_name: asok_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api/v1
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3000
    networks:
      - asok_net

networks:
  asok_net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
