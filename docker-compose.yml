name: asok-is

services:

  postgres:
    image: postgres:14-alpine
    container_name: asok_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: asok_is
      POSTGRES_USER: asok_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-asok_pass123}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asok_user -d asok_is"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - asok_net

  redis:
    image: redis:7-alpine
    container_name: asok_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - asok_net

  backend:
    build: ./backend
    container_name: asok_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://asok_user:${POSTGRES_PASSWORD:-asok_pass123}@postgres:5432/asok_is
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./models/llm:/app/models/llm:ro
      - ./Качество системы в разрезе времени по всем характеристикам.xlsx:/app/seed_data/Качество системы в разрезе времени по всем характеристикам.xlsx:ro
      - ./таблица для заполнения v8.1.xlsx:/app/seed_data/таблица для заполнения v8.1.xlsx:ro
      - /app/__pycache__
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - asok_net

  celery_worker:
    build: ./backend
    container_name: asok_celery
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://asok_user:${POSTGRES_PASSWORD:-asok_pass123}@postgres:5432/asok_is
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./models/llm:/app/models/llm:ro
      - /app/__pycache__
    command: celery -A app.workers.tasks.celery_app worker --loglevel=info --concurrency=2
    networks:
      - asok_net

  frontend:
    build: ./frontend
    container_name: asok_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Относительный путь — запросы идут на тот же хост и проксируются Vite на бэкенд.
      # Работает и на localhost, и по публичной ссылке туннеля (один источник, без CORS).
      - VITE_API_BASE_URL=/api/v1
      - VITE_PROXY_TARGET=http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3000
    networks:
      - asok_net

  # ── Вариант 1: быстрый туннель (СЛУЧАЙНАЯ ссылка trycloudflare.com) ──────────────
  # Протокол http2 (не quic) — обходит проблемы QUIC/UDP и ошибку Cloudflare 1033.
  #   docker compose --profile tunnel up -d
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: asok_tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate --protocol http2 --url http://frontend:3000
    depends_on:
      - frontend
    networks:
      - asok_net
    profiles:
      - tunnel

  # ── Вариант 2: СТАТИЧНАЯ ссылка на ВАШЕМ домене (named tunnel, Cloudflare) ────────
  # Стабильный URL https://asok.asokis.ai. Домен asokis.ai уже в Cloudflare.
  # В Zero Trust → Tunnels создать туннель, Public hostname asok.asokis.ai →
  # service http://frontend:3000, скопировать токен в .env как TUNNEL_TOKEN. Затем:
  #   docker compose --profile named up -d
  tunnel-named:
    image: cloudflare/cloudflared:latest
    container_name: asok_tunnel_named
    restart: unless-stopped
    command: tunnel --no-autoupdate run --protocol http2 --token ${TUNNEL_TOKEN:-}
    depends_on:
      - frontend
    networks:
      - asok_net
    profiles:
      - named

  # ── Вариант 3: СТАТИЧНЫЙ домен без своего домена (ngrok, бесплатный статик-домен) ──
  # В дашборде ngrok получить authtoken и забронировать бесплатный домен вида
  # your-name.ngrok-free.app → задать в .env NGROK_AUTHTOKEN и NGROK_DOMAIN. Затем:
  #   docker compose --profile ngrok up -d
  tunnel-ngrok:
    image: ngrok/ngrok:latest
    container_name: asok_ngrok
    restart: unless-stopped
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN:-}
    command: http frontend:3000 --url ${NGROK_DOMAIN:-} --log stdout
    depends_on:
      - frontend
    networks:
      - asok_net
    profiles:
      - ngrok

  # ── Вариант 4: ПРЯМОЙ хостинг с вашего ПК (БЕЗ туннеля/прокси в трафике) ──────────
  # Ваш ПК сам отдаёт https://asokis.ai. Caddy получает TLS-сертификат Let's Encrypt.
  # Требуется (делается вне ПК): проброс портов 80 и 443 на роутере → 192.168.1.97,
  # A-запись asokis.ai → ваш публичный IP в режиме DNS-only (серое облако), открытый firewall.
  #   docker compose --profile direct up -d
  webserver:
    image: caddy:2-alpine
    container_name: asok_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
    networks:
      - asok_net
    profiles:
      - direct

  # ── Доп. к Варианту 4: авто-обновление A-записи при смене домашнего IP (DDNS) ─────
  # Нужен Cloudflare API-токен с правом Zone:DNS:Edit для зоны asokis.ai.
  # В .env: CLOUDFLARE_API_TOKEN=... (и при желании DDNS_DOMAINS).
  #   docker compose --profile ddns up -d
  ddns:
    image: favonia/cloudflare-ddns:latest
    container_name: asok_ddns
    restart: unless-stopped
    user: "1000:1000"
    read_only: true
    cap_drop: [all]
    security_opt: [no-new-privileges:true]
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN:-}
      - DOMAINS=${DDNS_DOMAINS:-asokis.ai,www.asokis.ai}
      - PROXIED=false
      - IP6_PROVIDER=none
    networks:
      - asok_net
    profiles:
      - ddns

networks:
  asok_net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
